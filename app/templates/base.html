<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg" />
    <meta name="theme-color" content="#0b1422" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/site.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
      integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+"
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
      integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg"
      crossorigin="anonymous"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
      integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk"
      crossorigin="anonymous"
    ></script>
    <script defer src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.2.2/dist/purify.min.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a href="/" class="brand">
        <span class="brand-mark" aria-hidden="true">EE&amp;HH</span>
        <span class="brand-label">{{ app_name }}</span>
      </a>
      <button id="nav-toggle" class="nav-toggle" aria-label="Abrir menu">Menu</button>
      <nav id="main-nav" class="main-nav">
        <a href="/">Início</a>
        <a href="/roadmap">Roadmaps</a>
        <a href="/study">Estudar</a>
        <a href="/stats">Progresso</a>
        {% if user %}
        <button id="logout-btn" class="ghost-btn" type="button">Sair</button>
        {% else %}
        <a class="ghost-btn" href="/auth/login">Entrar</a>
        {% endif %}
      </nav>
    </header>

    <main class="page-shell">{% block content %}{% endblock %}</main>

    <footer class="site-footer">
      <span>Roadmap enxuto + Decks FSRS + Evidencia em projects/</span>
    </footer>

    <script defer src="/static/js/site.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
